name: Windows release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: v1.0.4
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-downloads:
    name: Build Windows downloads
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --yes --no-progress
          $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1 |
            ForEach-Object { Join-Path $_.FullName "bin" }
          if (-not $wixBin -or -not (Test-Path (Join-Path $wixBin "candle.exe"))) {
            throw "WiX Toolset was not installed in the expected location."
          }
          Add-Content -Path $env:GITHUB_PATH -Value $wixBin

      - name: Build Windows downloads
        run: .\gradlew.bat --no-daemon clean packageWindowsPortable packageWindowsInstaller

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scrollo-windows-downloads
          path: |
            build/distributions/*-windows-portable.zip
            build/installer/*.exe

      - name: Publish GitHub Release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          $zip = Get-ChildItem -Path "build/distributions" -Filter "*-windows-portable.zip" | Select-Object -First 1
          $installer = Get-ChildItem -Path "build/installer" -Filter "*.exe" | Select-Object -First 1
          if (-not $zip -or -not $installer) {
            throw "Could not find expected Windows downloads."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $zip.FullName $installer.FullName --clobber
          } else {
            gh release create $env:RELEASE_TAG $zip.FullName $installer.FullName `
              --target $env:GITHUB_SHA `
              --title "Scrollo $env:RELEASE_TAG" `
              --notes "Windows builds for Scrollo. Download the installer EXE, or use the portable ZIP if you prefer to extract and run Scrollo.exe directly. No Gradle or Java installation is required."
          }
